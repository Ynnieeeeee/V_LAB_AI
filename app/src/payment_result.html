<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K&#7871;t qu&#7843; thanh to&#225;n</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 20% 15%, rgba(59, 130, 246, 0.14), transparent 28rem),
                linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
            color: #111827;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 24px;
        }

        .receipt {
            width: min(420px, 100%);
            overflow: hidden;
            border-radius: 24px;
            background: #ffffff;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.18);
        }

        .header {
            padding: 28px 28px 22px;
            text-align: center;
        }

        .icon {
            width: 68px;
            height: 68px;
            margin: 0 auto 14px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            background: #dcfce7;
            color: #16a34a;
            font-size: 34px;
            font-weight: 800;
        }

        .icon.failed {
            background: #fee2e2;
            color: #dc2626;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            line-height: 1.2;
        }

        .subtitle {
            margin: 8px 0 0;
            color: #64748b;
            font-size: 14px;
            line-height: 1.45;
        }

        .dash {
            border-top: 1px dashed #cbd5e1;
            margin: 0 28px;
        }

        .content {
            padding: 24px 28px 20px;
            display: grid;
            gap: 18px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            gap: 18px;
        }

        .field {
            min-width: 0;
        }

        .field.right {
            text-align: right;
        }

        .label {
            margin: 0 0 6px;
            color: #94a3b8;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .value {
            margin: 0;
            color: #0f172a;
            font-size: 16px;
            font-weight: 750;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        .amount {
            color: #2563eb;
            font-size: 20px;
        }

        .bank-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            border-radius: 16px;
            background: #f8fafc;
        }

        .bank-mark {
            position: relative;
            width: 52px;
            height: 34px;
            flex: 0 0 auto;
        }

        .bank-mark::before,
        .bank-mark::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 30px;
            height: 30px;
            border-radius: 999px;
            transform: translateY(-50%);
        }

        .bank-mark::before {
            left: 2px;
            background: #ef4444;
        }

        .bank-mark::after {
            left: 20px;
            background: rgba(250, 204, 21, 0.9);
        }

        .footer {
            padding: 20px 28px 28px;
        }

        .home {
            width: 100%;
            border: 0;
            border-radius: 14px;
            background: #2563eb;
            color: #ffffff;
            cursor: pointer;
            font-size: 15px;
            font-weight: 750;
            padding: 14px 18px;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);
        }

        .home:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <main class="receipt">
        <section class="header">
            <div id="statusIcon" class="icon">✓</div>
            <h1 id="status">Thanh to&#225;n th&#224;nh c&#244;ng</h1>
            <p id="statusText" class="subtitle">Giao d&#7883;ch c&#7911;a b&#7841;n &#273;&#227; &#273;&#432;&#7907;c x&#7917; l&#253;.</p>
        </section>

        <div class="dash"></div>

        <section class="content">
            <div class="row">
                <div class="field">
                    <p class="label">M&#227; &#273;&#417;n</p>
                    <p id="order_id" class="value">—</p>
                </div>
                <div class="field right">
                    <p class="label">S&#7889; ti&#7873;n</p>
                    <p id="amount" class="value amount">—</p>
                </div>
            </div>

            <div class="field">
                <p class="label">M&#227; giao d&#7883;ch VNPAY</p>
                <p id="transaction_no" class="value">—</p>
            </div>

            <div class="field">
                <p class="label">Th&#7901;i gian</p>
                <p id="pay_date" class="value">—</p>
            </div>

            <div class="bank-card">
                <div class="bank-mark"></div>
                <div class="field">
                    <p class="label">Ng&#226;n h&#224;ng</p>
                    <p id="bank" class="value">—</p>
                    <p id="bank_transaction_no" class="subtitle">—</p>
                </div>
            </div>
        </section>

        <div class="dash"></div>

        <section class="footer">
            <button class="home" type="button" onclick="goHome()">Quay v&#7873; trang ch&#7911;</button>
        </section>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);

        function getParam(...keys) {
            for (const key of keys) {
                const value = params.get(key);
                if (value) return value;
            }
            return "";
        }

        function setText(id, value) {
            const element = document.getElementById(id);
            if (element) element.textContent = value || "—";
        }

        function getHomeUrl() {
            const homeUrl = new URL("/", window.location.origin);
            if (homeUrl.port === "8001") {
                homeUrl.port = "8000";
            }
            return homeUrl.toString();
        }

        function goHome() {
            window.location.href = getHomeUrl();
        }

        function formatAmount(rawAmount) {
            if (!rawAmount) return "—";
            const amount = Number(rawAmount) / 100;
            if (!Number.isFinite(amount)) return "—";
            return amount.toLocaleString("vi-VN") + " VND";
        }

        function formatPayDate(rawDate) {
            if (!rawDate || rawDate.length < 14) return "—";
            const year = rawDate.slice(0, 4);
            const month = rawDate.slice(4, 6);
            const day = rawDate.slice(6, 8);
            const hour = rawDate.slice(8, 10);
            const minute = rawDate.slice(10, 12);
            const second = rawDate.slice(12, 14);
            return `${day}/${month}/${year} ${hour}:${minute}:${second}`;
        }

        const responseCode = getParam("vnp_ResponseCode", "vnp_TransactionStatus");
        const success = responseCode === "00";
        const statusIcon = document.getElementById("statusIcon");

        if (!success) {
            statusIcon.textContent = "×";
            statusIcon.classList.add("failed");
            setText("status", "Thanh toán thất bại");
            setText("statusText", "Giao dịch chưa được hoàn tất. Vui lòng thử lại hoặc chọn phương thức khác.");
        }

        setText("order_id", getParam("vnp_TxnRef"));
        setText("transaction_no", getParam("vnp_TransactionNo"));
        setText("amount", formatAmount(getParam("vnp_Amount")));
        setText("pay_date", formatPayDate(getParam("vnp_PayDate", "vnp_CreateDate")));
        setText("bank", getParam("vnp_BankCode"));
        setText("bank_transaction_no", getParam("vnp_BankTranNo", "vnp_TransactionNo"));
    </script>
</body>
</html>
